name: Build & release wheels

# Production target is Linux x86_64 + aarch64. macOS builds are intentionally
# excluded because saltare's event loop is Linux-only (see eventloop.zig's
# `@compileError` on non-Linux targets); a kqueue port is not on the
# roadmap. PRs run the same Linux matrix as the release workflow.

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
  pull_request:
    paths:
      - "build.zig"
      - "build.zig.zon"
      - "CMakeLists.txt"
      - "pyproject.toml"
      - "src/**"
      - "scripts/**"
      - ".github/workflows/release.yml"

env:
  ZIG_VERSION: "0.16.0"

jobs:
  build_wheels:
    name: ${{ matrix.os }} (${{ matrix.arch }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest,    arch: x86_64  }
          - { os: ubuntu-24.04-arm, arch: aarch64 }
    steps:
      - uses: actions/checkout@v4

      # Pre-install Zig on the runner (with caching) and mount it into
      # the cibuildwheel container. Avoids `ziglang.org` reachability
      # problems from inside the manylinux image — those caused
      # 4–10 min hangs in `before_all` previously.
      - name: Cache Zig toolchain
        id: zig-cache
        uses: actions/cache@v4
        with:
          path: ${{ runner.temp }}/zig
          key: zig-${{ env.ZIG_VERSION }}-${{ runner.os }}-${{ matrix.arch }}

      - name: Install Zig on runner
        if: steps.zig-cache.outputs.cache-hit != 'true'
        env:
          ZIG_INSTALL_DIR: ${{ runner.temp }}/zig
          ZIG_SKIP_SYMLINK: "1"
        run: bash scripts/install-zig.sh

      - name: Build wheels
        uses: pypa/cibuildwheel@v3.4
        env:
          CIBW_ARCHS: ${{ matrix.arch }}
          # Mount the pre-installed Zig read-only and prepend it to PATH
          # inside the container. install-zig.sh's fast path then sees
          # `zig` already on PATH at the right version and exits early
          # — no in-container download needed.
          CIBW_CONTAINER_ENGINE: 'docker; create_args: --volume ${{ runner.temp }}/zig:/host-zig:ro'
          CIBW_ENVIRONMENT_LINUX: 'PATH=/host-zig:/usr/local/bin:$PATH ZIG_VERSION=${{ env.ZIG_VERSION }}'

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}-${{ matrix.arch }}
          path: ./wheelhouse/*.whl

  build_sdist:
    name: Source distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install build
      - run: python -m build --sdist
      - uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: ./dist/*.tar.gz

  publish:
    name: Publish to PyPI
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build_wheels, build_sdist]
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/saltare/
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist
