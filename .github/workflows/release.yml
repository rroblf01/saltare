name: Build & release wheels

# Production target is Linux x86_64 + aarch64. macOS builds are intentionally
# excluded because saltare's event loop is Linux-only (see eventloop.zig's
# `@compileError` on non-Linux targets); a kqueue port is not on the
# roadmap. PRs run the same Linux matrix as the release workflow.
#
# manylinux_2_28 + musllinux_1_2 are PyPI compatibility tags, not just
# container choices — PyPI rejects wheels tagged `linux_x86_64` (the
# raw-Linux tag) because they're not portable across distros. So the
# build images here are fixed; performance work is in the matrix shape
# (parallelism) and the test-stage split, not the base image.

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
  pull_request:
    paths:
      - "build.zig"
      - "build.zig.zon"
      - "CMakeLists.txt"
      - "pyproject.toml"
      - "src/**"
      - "scripts/**"
      - ".github/workflows/release.yml"

env:
  ZIG_VERSION: "0.16.0"

jobs:
  # ---------------------------------------------------------------------------
  # Wheels — 4-job fan-out: libc × arch. Each job builds the 5 supported
  # Python versions (cp310 .. cp314) for its one (libc, arch) combo.
  # GitHub free-tier concurrency caps at ~20 parallel jobs; 4 is safely
  # under that and runs in parallel with build_sdist + test_wheels.
  build_wheels:
    name: wheels ${{ matrix.libc }} ${{ matrix.arch }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest,    arch: x86_64,  libc: manylinux }
          - { os: ubuntu-latest,    arch: x86_64,  libc: musllinux }
          - { os: ubuntu-24.04-arm, arch: aarch64, libc: manylinux }
          - { os: ubuntu-24.04-arm, arch: aarch64, libc: musllinux }
    steps:
      - uses: actions/checkout@v4

      # Pre-install Zig on the runner (with caching) and mount it into
      # the cibuildwheel container. Avoids `ziglang.org` reachability
      # problems from inside the manylinux image — those caused
      # 4–10 min hangs in `before_all` previously.
      - name: Cache Zig toolchain
        id: zig-cache
        uses: actions/cache@v4
        with:
          path: ${{ runner.temp }}/zig
          key: zig-${{ env.ZIG_VERSION }}-${{ runner.os }}-${{ matrix.arch }}

      - name: Install Zig on runner
        if: steps.zig-cache.outputs.cache-hit != 'true'
        env:
          ZIG_INSTALL_DIR: ${{ runner.temp }}/zig
          ZIG_SKIP_SYMLINK: "1"
        run: bash scripts/install-zig.sh

      - name: Cache Zig build artifacts
        uses: actions/cache@v4
        with:
          path: ${{ runner.temp }}/zig-global-cache
          key: zig-build-${{ matrix.arch }}-${{ matrix.libc }}-${{ github.sha }}
          restore-keys: |
            zig-build-${{ matrix.arch }}-${{ matrix.libc }}-

      # Tier-5: cache pip's download/wheel cache across runs so the
      # build-time dependency install (`scikit-build-core`, `ninja`) skips
      # the PyPI round-trip on cache hits. Keyed by pyproject.toml so
      # cache invalidates only when build-deps change.
      - name: Cache pip downloads
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ matrix.arch }}-${{ matrix.libc }}-${{ hashFiles('pyproject.toml') }}
          restore-keys: |
            pip-${{ matrix.arch }}-${{ matrix.libc }}-

      # Tier-3: skip cibuildwheel's per-wheel test pass entirely. Tests
      # run once in the separate `test_wheels` job below.
      - name: Build wheels
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 30
          max_attempts: 3
          retry_wait_seconds: 30
          retry_on: error
          command: |
            mkdir -p ${{ runner.temp }}/zig-global-cache
            CIBW_ARCHS=${{ matrix.arch }} \
            CIBW_BUILD='cp31?-${{ matrix.libc }}_*' \
            CIBW_TEST_SKIP='*' \
            CIBW_CONTAINER_ENGINE='docker; create_args: --volume ${{ runner.temp }}/zig:/host-zig:ro --volume ${{ runner.temp }}/zig-global-cache:/host-zig-cache:rw' \
            CIBW_ENVIRONMENT_LINUX='PATH=/host-zig:/usr/local/bin:$PATH ZIG_VERSION=${{ env.ZIG_VERSION }} ZIG_GLOBAL_CACHE_DIR=/host-zig-cache PIP_DISABLE_PIP_VERSION_CHECK=1 PIP_NO_WARN_SCRIPT_LOCATION=0' \
            pipx run cibuildwheel==3.4.1 --output-dir wheelhouse

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.arch }}-${{ matrix.libc }}
          path: ./wheelhouse/*.whl

  # ---------------------------------------------------------------------------
  # Tier-3 test stage. Downloads the manylinux x86_64 wheel set built
  # above and runs `pytest -q tests` against cp310 / cp312 / cp314 in a
  # lightweight ubuntu-latest runner — no manylinux container needed for
  # the test phase. Catches version-specific issues without re-paying
  # the cibuildwheel per-wheel install tax × 5 Python versions × 4
  # (libc, arch) jobs.
  test_wheels:
    name: test cp${{ matrix.py_short }}
    needs: build_wheels
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - { python-version: "3.10", py_short: "310" }
          - { python-version: "3.12", py_short: "312" }
          - { python-version: "3.14", py_short: "314" }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - uses: actions/download-artifact@v4
        with:
          name: wheels-x86_64-manylinux
          path: wheelhouse

      - name: Cache pip downloads (test)
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-test-${{ matrix.python-version }}-${{ hashFiles('pyproject.toml') }}
          restore-keys: |
            pip-test-${{ matrix.python-version }}-

      - name: Install wheel + test deps
        run: |
          pip install --upgrade pip
          # Match the test-requires baked into pyproject.toml's
          # [tool.cibuildwheel]; keeps both runs honest.
          pip install pytest httpx fastapi websockets pytest-rerunfailures
          # Pick the wheel matching this runner's CPython tag.
          pip install --no-deps wheelhouse/saltare-*-cp${{ matrix.py_short }}-cp${{ matrix.py_short }}*-manylinux_2_28_x86_64.whl

      - name: Run pytest
        run: pytest -q tests

  # ---------------------------------------------------------------------------
  # Source distribution. Independent of the wheel matrix — runs once on
  # ubuntu-latest, no manylinux needed (sdists are platform-agnostic).
  build_sdist:
    name: Source distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install build
      - run: python -m build --sdist
      - uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: ./dist/*.tar.gz

  # ---------------------------------------------------------------------------
  # PyPI publish. Gated on tag pushes AND on test_wheels passing.
  publish:
    name: Publish to PyPI
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build_wheels, test_wheels, build_sdist]
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/saltare/
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist
