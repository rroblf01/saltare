name: Build & release wheels

# Production target is Linux x86_64 + aarch64. macOS builds are intentionally
# excluded because saltare's event loop is Linux-only (see eventloop.zig's
# `@compileError` on non-Linux targets); a kqueue port is not on the
# roadmap. PRs run the same Linux matrix as the release workflow.

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
  pull_request:
    paths:
      - "build.zig"
      - "build.zig.zon"
      - "CMakeLists.txt"
      - "pyproject.toml"
      - "src/**"
      - "scripts/**"
      - ".github/workflows/release.yml"

jobs:
  build_wheels:
    name: ${{ matrix.os }} (${{ matrix.arch }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest,    arch: x86_64  }
          - { os: ubuntu-24.04-arm, arch: aarch64 }
    steps:
      - uses: actions/checkout@v4

      - name: Build wheels
        uses: pypa/cibuildwheel@v2.22
        env:
          CIBW_ARCHS: ${{ matrix.arch }}

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}-${{ matrix.arch }}
          path: ./wheelhouse/*.whl

  build_sdist:
    name: Source distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install build
      - run: python -m build --sdist
      - uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: ./dist/*.tar.gz

  publish:
    name: Publish to PyPI
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build_wheels, build_sdist]
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/saltare/
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist
